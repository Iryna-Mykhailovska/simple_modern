<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css" />

    <link rel="stylesheet" href="./css/main.css">
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.png">

    <title>Monticello</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__container">
                <nav class="header__nav nav">
                    <a href="#" class="header__logo logo">
                        <svg width="241" height="54" class="logo__icon">
                            <use xlink:href="./assets/img/svg/Logo.svg"></use>
                        </svg>
                    </a>
                    <input type="checkbox" id="nav-burger" class="nav__burger burger">
                    <label for="nav-burger" class="burger__img"></label>

                    <ul class="header__menu menu">
                        <li class="header__menu-item">

                            <a class="header__menu-link" href="#about">ABOUT US</a>
                        </li>
                        <li class="header__menu-item"><a class="header__menu-link" href="#projects">PROJECTS</a></li>
                        <li class="header__menu-item"><a class="header__menu-link" href="#news">NEWS</a></li>
                        <li class="header__menu-item"><a class="header__menu-link" href="#contact">CONTACT</a></li>
                    </ul>

                </nav>
                <ul class="header__social social">
                    <li class="header__social-item"><a href="#" class="header__social-link">
                            <svg width="10" height="18" class="header__social-icon">
                                <use xlink:href="./assets/img/svg/sprite.svg#icon-facebook"></use>
                            </svg>
                        </a></li>
                    <li class="header__social-item"><a href="#" class="header__social-link"><svg width="18" height="15"
                                class="header__social-icon">
                                <use xlink:href="./assets/img/svg/sprite.svg#icon-twitter"></use>
                            </svg></a></li>
                    <li class="header__social-item"><a href="#" class="header__social-link"><svg width="16" height="16"
                                class="header__social-icon">
                                <use xlink:href="./assets/img/svg/sprite.svg#icon-instagram"></use>
                            </svg></a></li>
                </ul>
            </div>
        </div>
        <div class="slider">
            <div class="slider-slide">
                <div class="slider__content sl_content">
                    <h1 class="sl_content_title">SIMPLE & MODERN</h1>
                    <h2 class="sl_content_subtitle">WE MAKE THE WORLD BEAUTIFUL EVERYDAY</h2>

                </div>
                <img src="./assets/img/background_header_1.jpg" alt="" class="slider-slide__img">
            </div>
            <div class="slider-slide">
                <div class="slider__content sl_content">
                    <img src="./assets/img/background_header_2.jpg" alt="" class="slider-slide__img">
                </div>
            </div>
            <div class="slider-slide">
                <div class="slider__content sl_content">
                    <img src="./assets/img/background_header_3.jpg" alt="" class="slider-slide__img">
                </div>
            </div>
            <div class="slider-slide">
                <div class="slider__content sl_content">
                    <img src="./assets/img/background_header_4.jpg" alt="" class="slider-slide__img">
                </div>
            </div>
        </div>
    </header>
    <main>
        <section id="about">
            <div class="container">
                <h2>WHAT WE DO</h2>
            </div>
        </section>
        <section id="projects">
            <div class="container">
                <h2>PROJECTS</h2>
            </div>
        </section>
        <section id="news">
            <div class="container">
                <h2>NEWS</h2>
            </div>
        </section>
        <section id="contact">
            <div class="container">
                <h2>CONTACT</h2>
            </div>
        </section>
    </main>
    <footer>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script src="js/slick-slider.js"></script>
    <script src="js/main.js"></script>

</body>
